<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1020" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="cGreen" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4ac77e"/></marker>
    <marker id="cInk" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c9c2df"/></marker>
    <marker id="cBlue" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5aa0e0"/></marker>
    <marker id="cRed" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#e0655a"/></marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1020" fill="#0f0b1a"/>

  <text x="50" y="50" fill="#ECE9F5" font-size="32" font-weight="700">Gondola today: what actually runs vs. what is built but not wired</text>
  <text x="50" y="79" fill="#A79DBD" font-size="16">A strong <tspan fill="#4ac77e" font-weight="600">live inner loop</tspan> on Pi + Venice. The intended <tspan fill="#e5b567" font-weight="600">outer loop</tspan> exists in code and tests, but is disconnected from the running agent.</text>

  <rect x="1118" y="34" width="16" height="16" rx="3" fill="#1c3327" stroke="#4ac77e"/>
  <text x="1142" y="47" fill="#C9C2DF" font-size="13.5">live / wired</text>
  <rect x="1258" y="34" width="16" height="16" rx="3" fill="#2a2211" stroke="#e5b567" stroke-dasharray="3 3"/>
  <text x="1282" y="47" fill="#C9C2DF" font-size="13.5">built, not wired</text>

  <!-- LIVE REGION -->
  <rect x="50" y="96" width="960" height="616" rx="18" fill="#0d1712" stroke="#2f6b45"/>
  <text x="72" y="128" fill="#4ac77e" font-size="18" font-weight="700">LIVE RUNTIME - what actually runs today</text>

  <g font-size="13" text-anchor="middle">
    <rect x="70" y="146" width="280" height="56" rx="11" fill="#12261b" stroke="#4ac77e" stroke-opacity="0.6"/>
    <text x="210" y="170" fill="#ECE9F5" font-weight="600">Web companion</text>
    <text x="210" y="188" fill="#9fc9ad" font-size="11.5">voice / vision / media / workspace</text>
    <rect x="365" y="146" width="270" height="56" rx="11" fill="#12261b" stroke="#4ac77e" stroke-opacity="0.6"/>
    <text x="500" y="170" fill="#ECE9F5" font-weight="600">CLI harness</text>
    <text x="500" y="188" fill="#9fc9ad" font-size="11.5">self-editing coding agent</text>
    <rect x="650" y="146" width="340" height="56" rx="11" fill="#12261b" stroke="#4ac77e" stroke-opacity="0.6"/>
    <text x="820" y="170" fill="#ECE9F5" font-weight="600">Telegram channel + scheduler</text>
    <text x="820" y="188" fill="#9fc9ad" font-size="11.5">messages in/out / cron heartbeats</text>
  </g>

  <path d="M 210 202 L 300 232" fill="none" stroke="#4ac77e" stroke-width="1.8" marker-end="url(#cGreen)"/>
  <path d="M 500 202 L 500 232" fill="none" stroke="#4ac77e" stroke-width="1.8" marker-end="url(#cGreen)"/>
  <path d="M 820 202 L 720 232" fill="none" stroke="#4ac77e" stroke-width="1.8" marker-end="url(#cGreen)"/>
  <rect x="300" y="236" width="460" height="44" rx="10" fill="#163021" stroke="#4ac77e" stroke-opacity="0.5"/>
  <text x="530" y="263" fill="#d7efdf" font-size="13" text-anchor="middle">Run queue -&gt; enqueueAgentTurn (serial / session, &lt;=3 global)</text>

  <rect x="70" y="296" width="560" height="250" rx="14" fill="#101a24" stroke="#37506a"/>
  <text x="90" y="322" fill="#7fc7ff" font-size="15" font-weight="700">Pi Agent Core - the real inner loop</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="92" y="352" width="150" height="52" rx="10" fill="#16233a" stroke="#5aa0e0" stroke-opacity="0.7"/>
    <text x="167" y="374" fill="#ECE9F5">Model call</text><text x="167" y="391" fill="#9ab3d0" font-size="11">Venice chat</text>
    <rect x="262" y="352" width="120" height="52" rx="10" fill="#16233a" stroke="#5aa0e0" stroke-opacity="0.7"/>
    <text x="322" y="382" fill="#ECE9F5">Tool calls</text>
    <rect x="402" y="352" width="150" height="52" rx="10" fill="#16233a" stroke="#5aa0e0" stroke-opacity="0.7"/>
    <text x="477" y="382" fill="#ECE9F5">Tool results</text>
  </g>
  <path d="M 242 378 L 258 378" fill="none" stroke="#5aa0e0" stroke-width="1.8" marker-end="url(#cBlue)"/>
  <path d="M 382 378 L 398 378" fill="none" stroke="#5aa0e0" stroke-width="1.8" marker-end="url(#cBlue)"/>
  <path d="M 477 404 C 477 430, 167 430, 167 406" fill="none" stroke="#5aa0e0" stroke-width="1.8" marker-end="url(#cBlue)"/>
  <text x="322" y="446" fill="#7c93b3" font-size="11.5" text-anchor="middle">repeat until the model stops calling tools</text>
  <rect x="86" y="458" width="528" height="76" rx="10" fill="#2a1a12" stroke="#e0895a" stroke-opacity="0.6"/>
  <text x="100" y="480" fill="#f0a985" font-size="12.5" font-weight="600">(!) No verify / critique step on interactive turns.</text>
  <text x="100" y="500" fill="#d8b6a4" font-size="12">The act -&gt; verify -&gt; lesson -&gt; retry loop (loop.ts) with a separate judge</text>
  <text x="100" y="518" fill="#d8b6a4" font-size="12">runs only for scheduled goal tasks - never in chat.</text>

  <rect x="646" y="296" width="344" height="250" rx="14" fill="#101a24" stroke="#37506a"/>
  <text x="666" y="322" fill="#7fc7ff" font-size="15" font-weight="700">Live tools (createTools)</text>
  <g font-size="12.3" fill="#cfe6d6">
    <text x="666" y="350">- files: read / write / edit / list / search</text>
    <text x="666" y="374">- run_command (shell, gated + confirm)</text>
    <text x="666" y="398">- memory / search_memory (lexical)</text>
    <text x="666" y="422">- session_search (FTS / keyword)</text>
    <text x="666" y="446">- search_web / inspect_camera (vision)</text>
    <text x="666" y="470">- generate_image / _video / _music</text>
    <text x="666" y="494">- delegate_task (sub-agents &lt;= depth 3)</text>
    <text x="666" y="518">- MCP tools (per configured server)</text>
  </g>

  <text x="72" y="580" fill="#4ac77e" font-size="15" font-weight="700">Self-improvement that IS live <tspan fill="#7c9a86" font-size="12" font-weight="400">- task-level only, not config/tool self-modification</tspan></text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="70" y="596" width="290" height="98" rx="11" fill="#12261b" stroke="#4ac77e" stroke-opacity="0.55"/>
    <text x="215" y="626" fill="#ECE9F5" font-weight="600">Experience -&gt; skill distiller</text>
    <text x="215" y="648" fill="#9fc9ad" font-size="11.5">clusters past turns,</text>
    <text x="215" y="665" fill="#9fc9ad" font-size="11.5">suggests SKILL.md -</text>
    <text x="215" y="682" fill="#9fc9ad" font-size="11.5">you approve / install</text>
    <rect x="376" y="596" width="290" height="98" rx="11" fill="#12261b" stroke="#4ac77e" stroke-opacity="0.55"/>
    <text x="521" y="626" fill="#ECE9F5" font-weight="600">Memory auto-capture</text>
    <text x="521" y="648" fill="#9fc9ad" font-size="11.5">durable personal facts,</text>
    <text x="521" y="665" fill="#9fc9ad" font-size="11.5">injected into the prompt,</text>
    <text x="521" y="682" fill="#9fc9ad" font-size="11.5">optional approval gate</text>
    <rect x="682" y="596" width="290" height="98" rx="11" fill="#12261b" stroke="#4ac77e" stroke-opacity="0.55"/>
    <text x="827" y="626" fill="#ECE9F5" font-weight="600">Scheduled goal loop</text>
    <text x="827" y="648" fill="#9fc9ad" font-size="11.5">act -&gt; verify -&gt; lesson -&gt;</text>
    <text x="827" y="665" fill="#9fc9ad" font-size="11.5">retry, separate judge</text>
    <text x="827" y="682" fill="#9fc9ad" font-size="11.5">(cron tasks only)</text>
  </g>

  <!-- DORMANT REGION -->
  <rect x="1070" y="96" width="480" height="616" rx="18" fill="#1a1409" stroke="#7a5a1f"/>
  <text x="1092" y="126" fill="#e5b567" font-size="17" font-weight="700">BUILT BUT NOT WIRED</text>
  <text x="1092" y="147" fill="#b19a6a" font-size="12.5">the intended outer loop - complete code + tests,</text>
  <text x="1092" y="164" fill="#b19a6a" font-size="12.5">disconnected from the running agent</text>

  <g>
    <rect x="1090" y="178" width="440" height="98" rx="11" fill="#241c0d" stroke="#e5b567" stroke-opacity="0.6" stroke-dasharray="5 4"/>
    <text x="1108" y="202" fill="#ECE9F5" font-size="14" font-weight="600">Gondola Lab - control plane</text>
    <text x="1108" y="223" fill="#cbb885" font-size="12">traces -&gt; propose -&gt; champion vs challenger -&gt;</text>
    <text x="1108" y="240" fill="#cbb885" font-size="12">gates -&gt; promote / rollback (versioned)</text>
    <text x="1108" y="263" fill="#e08e5a" font-size="11.5">SIMULATED workflow / UI never mounted / no real runs</text>

    <rect x="1090" y="286" width="440" height="72" rx="11" fill="#241c0d" stroke="#e5b567" stroke-opacity="0.6" stroke-dasharray="5 4"/>
    <text x="1108" y="310" fill="#ECE9F5" font-size="14" font-weight="600">Model router - routeModel()</text>
    <text x="1108" y="330" fill="#cbb885" font-size="12">ranks models by modality / cost / context</text>
    <text x="1108" y="349" fill="#e08e5a" font-size="11.5">imported by tests only / agent uses manual settings</text>

    <rect x="1090" y="368" width="440" height="72" rx="11" fill="#241c0d" stroke="#e5b567" stroke-opacity="0.6" stroke-dasharray="5 4"/>
    <text x="1108" y="392" fill="#ECE9F5" font-size="14" font-weight="600">Custom tools / self-authored abilities</text>
    <text x="1108" y="412" fill="#cbb885" font-size="12">recipe -&gt; scoped sub-agent</text>
    <text x="1108" y="431" fill="#e08e5a" font-size="11.5">store empty / not registered in createTools</text>

    <rect x="1090" y="450" width="440" height="72" rx="11" fill="#241c0d" stroke="#e5b567" stroke-opacity="0.6" stroke-dasharray="5 4"/>
    <text x="1108" y="474" fill="#ECE9F5" font-size="14" font-weight="600">Capability-route model IDs</text>
    <text x="1108" y="494" fill="#cbb885" font-size="12">per-capability defaults derived at setup</text>
    <text x="1108" y="513" fill="#e08e5a" font-size="11.5">not passed at runtime / models from AgentSettings</text>

    <rect x="1090" y="532" width="440" height="90" rx="11" fill="#241c0d" stroke="#e5b567" stroke-opacity="0.6" stroke-dasharray="5 4"/>
    <text x="1108" y="556" fill="#ECE9F5" font-size="14" font-weight="600">Grounded self-model (identity.ts)</text>
    <text x="1108" y="576" fill="#cbb885" font-size="12">orchestrator / entity / owner / Lab kept separate,</text>
    <text x="1108" y="595" fill="#cbb885" font-size="12">consistent identity answers</text>
    <text x="1108" y="614" fill="#e08e5a" font-size="11.5">NEW / uncommitted / not yet in the system prompt</text>
  </g>

  <line x1="1040" y1="150" x2="1040" y2="660" stroke="#e5b567" stroke-width="2" stroke-dasharray="4 6" stroke-opacity="0.8"/>
  <path d="M 1010 300 L 1064 300" fill="none" stroke="#e0655a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#cRed)"/>
  <text x="1040" y="291" fill="#e0655a" font-size="15" text-anchor="middle" font-weight="700">X</text>
  <text x="1037" y="278" fill="#e0917f" font-size="10.5" text-anchor="end">traces</text>
  <path d="M 1070 470 L 1016 470" fill="none" stroke="#e0655a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#cRed)"/>
  <text x="1040" y="461" fill="#e0655a" font-size="15" text-anchor="middle" font-weight="700">X</text>
  <text x="1043" y="448" fill="#e0917f" font-size="10.5" text-anchor="start">promotions</text>
  <g transform="rotate(-90 1040 600)"><text x="1040" y="604" fill="#e5b567" font-size="13" text-anchor="middle" font-weight="700" letter-spacing="2">NOT WIRED</text></g>

  <!-- BOTTOM BANDS -->
  <rect x="50" y="732" width="900" height="272" rx="16" fill="#0f1a2c" stroke="#2c4a70"/>
  <text x="72" y="762" fill="#5aa0e0" font-size="16" font-weight="700">Venice API - one key, all modalities (LIVE)</text>
  <g font-size="12.5" text-anchor="middle" fill="#dbe7f5">
    <rect x="72" y="782" width="164" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="154" y="809">Chat / reasoning</text>
    <rect x="248" y="782" width="120" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="308" y="809">Vision</text>
    <rect x="380" y="782" width="130" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="445" y="809">Speech STT</text>
    <rect x="522" y="782" width="130" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="587" y="809">Speech TTS</text>
    <rect x="664" y="782" width="120" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="724" y="809">Image</text>
    <rect x="796" y="782" width="120" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="856" y="809">Video</text>
    <rect x="72" y="836" width="120" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="132" y="863">Music</text>
    <rect x="204" y="836" width="140" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="274" y="863">Web search</text>
    <rect x="356" y="836" width="150" height="44" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="431" y="863">Embeddings</text>
  </g>
  <text x="72" y="922" fill="#7c93b3" font-size="12.5">Single server-side key; every inference call routes here. Balance is observed;</text>
  <text x="72" y="942" fill="#7c93b3" font-size="12.5">only video / music are budget-gated (maxMediaUsd). No global spend ceiling on text / vision / speech.</text>
  <text x="72" y="978" fill="#8a7fa6" font-size="12">Provider layer abstracts 10 capabilities, but V1 registers only Venice.</text>

  <rect x="966" y="732" width="584" height="272" rx="16" fill="#141024" stroke="#4a3a72"/>
  <text x="988" y="762" fill="#a98be6" font-size="16" font-weight="700">Local .gondola/ (LIVE, on device)</text>
  <g font-size="12.7" fill="#d7ccf0">
    <text x="988" y="790">- chats / transcripts (full-fidelity rehydrate)</text>
    <text x="988" y="815">- memory.json + USER.md / MEMORY.md</text>
    <text x="988" y="840">- vectors.json - real local vector store (UI search)</text>
    <text x="988" y="865">- experience.json (skill-mining feedstock)</text>
    <text x="988" y="890">- skills / schedules / channels / loops/ (lessons)</text>
    <text x="988" y="915">- assets.json / media-tasks.json / custom-tools.json (empty)</text>
    <text x="988" y="940" fill="#e08e5a">- lab/ - absent (never seeded)</text>
  </g>

  <path d="M 350 712 L 350 730" fill="none" stroke="#5aa0e0" stroke-width="2" marker-end="url(#cBlue)"/>
  <path d="M 936 704 L 1024 730" fill="none" stroke="#a98be6" stroke-width="1.8" stroke-opacity="0.6" marker-end="url(#cInk)"/>
  <text x="946" y="698" fill="#8a7fa6" font-size="11" text-anchor="end">reads / writes state</text>
</svg>
