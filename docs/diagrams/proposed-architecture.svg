<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="aTeal" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#45c8c1"/></marker>
    <marker id="aPurple" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#a98be6"/></marker>
    <marker id="aGold" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#e5b567"/></marker>
    <marker id="aBlue" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5aa0e0"/></marker>
    <marker id="aInk" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c9c2df"/></marker>
    <linearGradient id="thesis" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a1f45"/><stop offset="1" stop-color="#241a3d"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#0f0b1a"/>

  <text x="60" y="52" fill="#ECE9F5" font-size="34" font-weight="700">Loop Engineering: the proposed architecture</text>
  <text x="60" y="82" fill="#A79DBD" font-size="17">Separate the agent that <tspan fill="#45c8c1" font-weight="600">does the work</tspan> (inner loop) from the system that <tspan fill="#a98be6" font-weight="600">evaluates &amp; governs it</tspan> (outer loop).</text>

  <rect x="60" y="104" width="1480" height="66" rx="14" fill="#1c1630" stroke="#e5b567" stroke-opacity="0.55"/>
  <text x="86" y="132" fill="#e5b567" font-size="17" font-weight="700">OWNER (you)</text>
  <text x="86" y="154" fill="#C9C2DF" font-size="14.5">Defines the goal / constraints / permissions / budget / the quality bar - and gives the final approval on any permanent change.</text>
  <text x="1516" y="144" fill="#8a7fa6" font-size="12.5" text-anchor="end">role shifts from operator to director</text>

  <rect x="356" y="184" width="888" height="60" rx="12" fill="url(#thesis)" stroke="#a98be6" stroke-opacity="0.5"/>
  <text x="800" y="210" fill="#EDE7FA" font-size="15.5" text-anchor="middle" font-weight="600">The core problem</text>
  <text x="800" y="231" fill="#C9C2DF" font-size="14" text-anchor="middle">The harness that performs a task should not be the only system that grades, redesigns, and governs itself.</text>

  <!-- INNER LOOP -->
  <rect x="60" y="266" width="700" height="500" rx="18" fill="#141024" stroke="#352a55"/>
  <text x="84" y="298" fill="#45c8c1" font-size="18" font-weight="700">INNER LOOP - Runtime / Harness (Pi)</text>
  <text x="84" y="320" fill="#8a7fa6" font-size="13.5">Completes the task.</text>

  <path d="M 415 340 A 205 168 0 1 1 400 341" fill="none" stroke="#45c8c1" stroke-opacity="0.45" stroke-width="2.5" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#aTeal)"/>

  <rect x="330" y="474" width="170" height="56" rx="12" fill="#122a2c" stroke="#45c8c1" stroke-opacity="0.7"/>
  <text x="415" y="498" fill="#bdeeea" font-size="13.5" text-anchor="middle" font-weight="600">Working memory</text>
  <text x="415" y="516" fill="#7fb8b5" font-size="12" text-anchor="middle">task state &amp; context</text>

  <g font-size="13.5" text-anchor="middle">
    <rect x="315" y="308" width="200" height="56" rx="12" fill="#1e1836" stroke="#45c8c1" stroke-opacity="0.7"/>
    <text x="415" y="332" fill="#ECE9F5" font-weight="600">1. Plan</text>
    <text x="415" y="350" fill="#A79DBD" font-size="12">decompose the goal</text>
    <rect x="510" y="421" width="200" height="56" rx="12" fill="#1e1836" stroke="#45c8c1" stroke-opacity="0.7"/>
    <text x="610" y="445" fill="#ECE9F5" font-weight="600">2. Route</text>
    <text x="610" y="463" fill="#A79DBD" font-size="12">pick model + tool</text>
    <rect x="436" y="606" width="200" height="56" rx="12" fill="#1e1836" stroke="#45c8c1" stroke-opacity="0.7"/>
    <text x="536" y="630" fill="#ECE9F5" font-weight="600">3. Act</text>
    <text x="536" y="648" fill="#A79DBD" font-size="12">call tool / model</text>
    <rect x="195" y="606" width="200" height="56" rx="12" fill="#1e1836" stroke="#45c8c1" stroke-opacity="0.7"/>
    <text x="295" y="630" fill="#ECE9F5" font-weight="600">4. Observe</text>
    <text x="295" y="648" fill="#A79DBD" font-size="12">read the result</text>
    <rect x="120" y="421" width="200" height="56" rx="12" fill="#1e1836" stroke="#45c8c1" stroke-opacity="0.7"/>
    <text x="220" y="441" fill="#ECE9F5" font-weight="600">5. Verify</text>
    <text x="220" y="459" fill="#A79DBD" font-size="12">vs goal + checks</text>
  </g>

  <path d="M 415 170 L 415 306" fill="none" stroke="#e5b567" stroke-width="2.2" marker-end="url(#aGold)"/>
  <text x="425" y="250" fill="#e5b567" font-size="12.5">goal</text>

  <path d="M 160 449 L 128 449 L 128 726" fill="none" stroke="#45c8c1" stroke-width="2" marker-end="url(#aTeal)"/>
  <rect x="86" y="700" width="150" height="46" rx="10" fill="#122a2c" stroke="#45c8c1" stroke-opacity="0.7"/>
  <text x="161" y="728" fill="#bdeeea" font-size="13" text-anchor="middle">deliver result</text>

  <!-- OUTER LOOP -->
  <rect x="840" y="266" width="700" height="500" rx="18" fill="#141024" stroke="#4a3a72"/>
  <text x="864" y="298" fill="#a98be6" font-size="18" font-weight="700">OUTER LOOP - Control layer (Gondola Lab)</text>
  <text x="864" y="320" fill="#8a7fa6" font-size="13.5">Evaluates &amp; governs the agent.</text>
  <text x="1185" y="748" fill="#9a86c4" font-size="13" text-anchor="middle" font-style="italic">the agent never grades its own homework</text>

  <path d="M 1185 340 A 210 168 0 1 1 1170 341" fill="none" stroke="#a98be6" stroke-opacity="0.4" stroke-width="2.5" stroke-dasharray="2 8" stroke-linecap="round" marker-end="url(#aPurple)"/>

  <rect x="1095" y="474" width="180" height="56" rx="12" fill="#241a3d" stroke="#a98be6" stroke-opacity="0.7"/>
  <text x="1185" y="498" fill="#e2d5fb" font-size="13" text-anchor="middle" font-weight="600">Traces / versions</text>
  <text x="1185" y="516" fill="#a291c4" font-size="12" text-anchor="middle">immutable / rollback</text>

  <g font-size="13" text-anchor="middle">
    <rect x="898" y="387" width="210" height="56" rx="12" fill="#1e1836" stroke="#a98be6" stroke-opacity="0.7"/>
    <text x="1003" y="411" fill="#ECE9F5" font-weight="600">1. Collect traces</text>
    <text x="1003" y="429" fill="#A79DBD" font-size="11.5">every run, immutable</text>
    <rect x="1080" y="302" width="210" height="56" rx="12" fill="#1e1836" stroke="#a98be6" stroke-opacity="0.7"/>
    <text x="1185" y="326" fill="#ECE9F5" font-weight="600">2. Analyze failures</text>
    <text x="1185" y="344" fill="#A79DBD" font-size="11.5">find repeated patterns</text>
    <rect x="1262" y="387" width="210" height="56" rx="12" fill="#1e1836" stroke="#a98be6" stroke-opacity="0.7"/>
    <text x="1367" y="411" fill="#ECE9F5" font-weight="600">3. Propose change</text>
    <text x="1367" y="429" fill="#A79DBD" font-size="11.5">prompt / route / tool</text>
    <rect x="1262" y="557" width="210" height="56" rx="12" fill="#1e1836" stroke="#a98be6" stroke-opacity="0.7"/>
    <text x="1367" y="581" fill="#ECE9F5" font-weight="600">4. Sandbox test</text>
    <text x="1367" y="599" fill="#A79DBD" font-size="11.5">champion vs challenger</text>
    <rect x="1080" y="642" width="210" height="56" rx="12" fill="#1e1836" stroke="#a98be6" stroke-opacity="0.7"/>
    <text x="1185" y="666" fill="#ECE9F5" font-weight="600">5. Gates + approval</text>
    <text x="1185" y="684" fill="#A79DBD" font-size="11.5">higher quality / lower cost</text>
    <rect x="898" y="557" width="210" height="56" rx="12" fill="#1e1836" stroke="#a98be6" stroke-opacity="0.7"/>
    <text x="1003" y="581" fill="#ECE9F5" font-weight="600">6. Versioned update</text>
    <text x="1003" y="599" fill="#A79DBD" font-size="11.5">promote / roll back</text>
  </g>

  <path d="M 1185 170 L 1185 296" fill="none" stroke="#e5b567" stroke-width="2.2" marker-end="url(#aGold)" stroke-dasharray="6 5"/>
  <text x="1195" y="250" fill="#e5b567" font-size="12.5">approval</text>

  <line x1="800" y1="270" x2="800" y2="762" stroke="#4a3a72" stroke-width="1.5" stroke-dasharray="3 7"/>
  <path d="M 720 408 C 800 388, 830 400, 892 408" fill="none" stroke="#c9c2df" stroke-width="2.2" marker-end="url(#aInk)"/>
  <text x="806" y="384" fill="#c9c2df" font-size="12.5" text-anchor="middle">traces from every run</text>
  <path d="M 892 590 C 830 604, 800 592, 724 560" fill="none" stroke="#c9c2df" stroke-width="2.2" marker-end="url(#aInk)"/>
  <text x="806" y="626" fill="#c9c2df" font-size="12.5" text-anchor="middle">approved change to new config</text>

  <!-- CAPABILITY LAYER -->
  <rect x="60" y="800" width="1480" height="150" rx="16" fill="#0f1a2c" stroke="#2c4a70"/>
  <text x="86" y="832" fill="#5aa0e0" font-size="17" font-weight="700">CAPABILITY LAYER - one provider (Venice): capabilities, not products</text>
  <text x="86" y="853" fill="#7c93b3" font-size="13">The agent thinks in capabilities; the router turns each step into the right model call (modality / cost / quality).</text>

  <g font-size="13" text-anchor="middle" fill="#dbe7f5">
    <rect x="86" y="880" width="140" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="156" y="908">Reasoning</text>
    <rect x="238" y="880" width="120" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="298" y="908">Vision</text>
    <rect x="370" y="880" width="150" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="445" y="908">Speech STT/TTS</text>
    <rect x="532" y="880" width="120" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="592" y="908">Image</text>
    <rect x="664" y="880" width="120" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="724" y="908">Video</text>
    <rect x="796" y="880" width="120" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="856" y="908">Music/Audio</text>
    <rect x="928" y="880" width="140" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="998" y="908">Web search</text>
    <rect x="1080" y="880" width="150" height="46" rx="10" fill="#132539" stroke="#5aa0e0" stroke-opacity="0.6"/><text x="1155" y="908">Embeddings</text>
    <rect x="1242" y="880" width="290" height="46" rx="10" fill="#16233a" stroke="#5aa0e0" stroke-opacity="0.9"/><text x="1387" y="901" font-weight="600">Model registry + router</text><text x="1387" y="918" font-size="11" fill="#9ab3d0">picks the model per task</text>
  </g>

  <path d="M 415 726 L 415 792" fill="none" stroke="#5aa0e0" stroke-width="2.2" marker-end="url(#aBlue)"/>
  <text x="425" y="784" fill="#5aa0e0" font-size="12">capability calls</text>
</svg>
